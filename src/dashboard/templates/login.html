<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Outreach Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f3f4f8; }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                <svg width="24" height="24" fill="white" viewBox="0 0 16 16"><path d="M8 0L14.928 4v8L8 16 1.072 12V4z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome back</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to your Outreach Agent</p>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8" id="login-card">
            <div id="error-box" class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-5 hidden"></div>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-5">
                {{ error }}
            </div>
            {% endif %}

            <form id="login-form" class="space-y-5" onsubmit="return handleLogin(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <input type="text" name="username" id="username" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition"
                           placeholder="Enter your username" value="{{ username or '' }}">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" name="password" id="password" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition"
                           placeholder="Enter your password">
                </div>
                <button type="submit" id="login-btn"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-sm hover:shadow-lg hover:shadow-indigo-200 transition-all">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Demo quick-login -->
        <div class="bg-indigo-50 border border-indigo-200 rounded-2xl p-5 mt-5">
            <p class="text-sm font-semibold text-indigo-700 mb-2">Quick Demo Access</p>
            <p class="text-xs text-indigo-600 mb-3">Try the platform instantly — no signup needed.</p>
            <button onclick="demoLogin()" id="demo-btn" class="w-full py-2.5 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 transition-all">
                Sign in as Demo User
            </button>
        </div>

        <p class="text-center text-sm text-gray-500 mt-5">
            Don't have an account? <a href="/register" class="text-indigo-600 font-medium hover:underline">Create one</a>
        </p>
    </div>

<script>
// Check if already logged in via localStorage
(function() {
    var auth = localStorage.getItem('oa_auth');
    if (auth) {
        try {
            var data = JSON.parse(auth);
            if (data && data.loggedIn) {
                window.location.href = '/';
                return;
            }
        } catch(e) {}
    }
})();

function showError(msg) {
    var box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.remove('hidden');
    document.getElementById('login-card').classList.add('shake');
    setTimeout(function() { document.getElementById('login-card').classList.remove('shake'); }, 400);
}

function handleLogin(e) {
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.getElementById('login-btn');

    if (!username || !password) {
        showError('Please enter username and password.');
        return false;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    // First try server-side auth
    var formData = new FormData();
    formData.append('username', username);
    formData.append('password', password);

    fetch('/login', {
        method: 'POST',
        body: formData,
        redirect: 'manual'
    }).then(function(resp) {
        // If server responds with redirect (303 to / or /settings), auth worked
        if (resp.status === 0 || resp.type === 'opaqueredirect' || resp.redirected || resp.status === 303 || resp.status === 200) {
            // Also store in localStorage as backup
            storeAuth(username, username);
            window.location.href = '/';
            return;
        }
        // Server rejected — try localStorage auth
        return fallbackAuth(username, password);
    }).catch(function() {
        // Network error or server down — use localStorage auth
        return fallbackAuth(username, password);
    });

    return false;
}

function fallbackAuth(username, password) {
    var btn = document.getElementById('login-btn');
    // Check demo credentials
    if (username === 'demo' && password === 'demo1234') {
        storeAuth('demo', 'Demo User');
        window.location.href = '/';
        return;
    }
    // Check registered users in localStorage
    var users = JSON.parse(localStorage.getItem('oa_users') || '{}');
    if (users[username] && users[username].password === password) {
        storeAuth(username, users[username].name || username);
        window.location.href = '/';
        return;
    }
    // Failed
    btn.disabled = false;
    btn.textContent = 'Sign In';
    showError('Invalid username or password.');
}

function storeAuth(username, name) {
    localStorage.setItem('oa_auth', JSON.stringify({
        user: username,
        name: name || username,
        loggedIn: true,
        loginTime: new Date().toISOString()
    }));
}

function demoLogin() {
    var btn = document.getElementById('demo-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    // Store demo auth in localStorage
    storeAuth('demo', 'Demo User');

    // Also try server-side login
    var formData = new FormData();
    formData.append('username', 'demo');
    formData.append('password', 'demo1234');
    fetch('/login', { method: 'POST', body: formData, redirect: 'manual' })
        .finally(function() {
            window.location.href = '/';
        });
}
</script>
</body>
</html>
